openapi: 3.0.0
info:
  title: Finance Dashboard API
  description: >
    A robust backend REST API for managing personal finances, tracking transactions, 
    and generating real-time analytical summaries. Built with Node.js, Express, and Prisma PostgreSQL.
    
    Features include Role-Based Access Control (RBAC), Pagination, Search, Soft Deletes, and dynamic filtering.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local Development Server

# ---------------------------------------------------------
# COMPONENTS (Reusable Models and Security)
# ---------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token here to authenticate requests.

  schemas:
    # -- Core Data Models --
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 4bbc883e-7cd4-4a3f-b127-323eb6634e11
        amount:
          type: number
          example: 1500.50
        type:
          type: string
          enum: [INCOME, EXPENSE]
        category:
          type: string
          example: Software Subscriptions
        description:
          type: string
          example: Annual GitHub Pro Plan
        date:
          type: string
          format: date-time
          example: "2026-04-10T10:00:00.000Z"
        isDeleted:
          type: boolean
          example: false
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Admin User
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, ANALYST, VIEWER]
        createdAt:
          type: string
          format: date-time

    # -- Request Bodies --
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@dashboard.com
        password:
          type: string
          example: supersecurepassword

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@dashboard.com
        password:
          type: string
          example: newsecurepassword

    TransactionInput:
      type: object
      required: [amount, type, category, description, date]
      properties:
        amount:
          type: number
          example: 250
        type:
          type: string
          enum: [INCOME, EXPENSE]
        category:
          type: string
          example: Utilities
        description:
          type: string
          example: Monthly Electric Bill
        date:
          type: string
          format: date-time
          example: "2026-04-15T00:00:00Z"

    # -- Standard Responses --
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Invalid credentials or missing fields."

# ---------------------------------------------------------
# ROUTES (Paths)
# ---------------------------------------------------------
paths:
  # -- AUTHENTICATION --
  /api/auth/register:
    post:
      summary: Register a new user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: User successfully created
        '400':
          description: Validation error or Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Login to receive a JWT Token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIs..."
        '401':
          description: Unauthorized - Invalid password or email

  # -- USERS --
  /api/users:
    get:
      summary: Retrieve all registered users
      description: Returns a list of all users. Restricted to ADMIN role.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '403':
          description: Forbidden - Insufficient role permissions

  /api/users/profile:
    get:
      summary: Get current user profile
      description: Returns the details of the currently authenticated user based on the JWT token.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully

  /api/users/{id}:
    get:
      summary: Get user by ID
      description: Retrieves specific user details. Restricted to ADMIN.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
        '404':
          description: User not found

    delete:
      summary: Remove a user account
      description: Permanently removes a user from the system. Restricted to ADMIN.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deleted successfully

  /api/users/{id}/role:
    patch:
      summary: Update a user's role
      description: Allows an Admin to change a user's permission level.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [ADMIN, ANALYST, VIEWER]
      responses:
        '200':
          description: Role updated successfully

  /api/users/{id}/status:
    patch:
      summary: Update a user's active status
      description: Allows an Admin to activate or deactivate a user account.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Status updated successfully

  # -- TRANSACTIONS --
  /api/transactions:
    get:
      summary: Get transactions (Paginated & Filtered)
      description: Retrieve transactions with full support for pagination, keyword search, and exact date/type filtering. Does not return soft-deleted records.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of records per page
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive search across category and description
        - in: query
          name: type
          schema:
            type: string
            enum: [INCOME, EXPENSE]
          description: Filter explicitly by Income or Expense
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Fetch records from this date onward (YYYY-MM-DD)
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Fetch records up to this date (YYYY-MM-DD)
      responses:
        '200':
          description: Successfully retrieved transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  meta:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                        example: 45
                      currentPage:
                        type: integer
                        example: 1
                      totalPages:
                        type: integer
                        example: 5
                      hasNextPage:
                        type: boolean
                        example: true

    post:
      summary: Create a new transaction
      description: Creates a new financial record. Restricted to ADMIN role.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionInput'
      responses:
        '201':
          description: Transaction successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Transaction'

  /api/transactions/{id}:
    patch:
      summary: Partially update a transaction
      description: Update specific fields of an existing transaction. Restricted to ADMIN role.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The unique ID of the transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                category:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Record successfully updated
        '404':
          description: Transaction not found

    delete:
      summary: Soft Delete a transaction
      description: Hides the transaction by flipping `isDeleted` to true. Data is preserved in the database. Restricted to ADMIN role.
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The unique ID of the transaction
      responses:
        '204':
          description: No Content - Successfully soft-deleted
        '404':
          description: Transaction not found

  # -- ANALYTICS --
  /api/analysis/summary:
    get:
      summary: Retrieve financial summary metrics
      description: Aggregates total income, expenses, and net balance. Supports month and year filtering.
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Numeric month (1 for Jan, 12 for Dec)
        - in: query
          name: year
          schema:
            type: integer
          description: Full year (e.g., 2026)
      responses:
        '200':
          description: Analytics generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalIncome:
                        type: number
                        example: 5500.00
                      totalExpense:
                        type: number
                        example: 1200.50
                      netBalance:
                        type: number
                        example: 4299.50
                      totalTransactions:
                        type: integer
                        example: 15